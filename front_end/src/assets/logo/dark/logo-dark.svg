<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50" width="100%" height="100%">
  <defs>
    <filter id="glow-dark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="zGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(4, 1)">
    <!-- Tech Outer Ring -->
    <path d="M 24 4 A 20 20 0 1 1 4 24" fill="none" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
    <path d="M 4 24 A 20 20 0 0 1 10 10" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round" filter="url(#glow-dark)" opacity="0.8"/>
    
    <!-- Abstract Z Mark -->
    <path d="M 14 17 L 34 17 L 14 31 L 34 31" fill="none" stroke="url(#zGradDark)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Neon Nodes -->
    <circle cx="14" cy="17" r="3" fill="#FFFFFF" filter="url(#glow-dark)" />
    <circle cx="34" cy="31" r="3" fill="#FFFFFF" filter="url(#glow-dark)" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(62, 26)">
    <text x="0" y="0" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="20" fill="#F9FAFB" letter-spacing="2">ZENLITHIC</text>
    <text x="3" y="14" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="8.5" fill="#9CA3AF" letter-spacing="5.6">TECHNOLOGIES</text>
  </g>
</svg>
